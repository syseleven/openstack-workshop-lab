#cloud-config
manage_etc_hosts: true
hostname: ${hostname}.nova.local

users:
  - name: syseleven
    gecos: syseleven Stack user
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock-passwd: false

packages:
  - nginx

runcmd:
  - [ systemctl, enable, --now, nginx ]
  - echo "<h1>Hello from ${hostname}</h1>" > /var/www/html/index.html